  - generic [ref=e63]:
    - generic [ref=e64]:
      - generic [ref=e65]:
        - heading "De kracht van design, development en AI onder één dak." [level=2] [ref=e66]
        - paragraph [ref=e67]: MNRV is geen traditioneel bureau met lagen, schakels en trage overdrachten. Wij zijn een compact en slagvaardig team van specialisten die operations, design, development en AI samenbrengen in één geïntegreerde aanpak.
        - paragraph [ref=e68]: Wat ons onderscheidt, is dat we niet denken vanuit losse disciplines, maar vanuit het geheel. De beste digitale oplossingen ontstaan namelijk niet wanneer strategie, processen, design en techniek afzonderlijk van elkaar worden ontwikkeld, maar wanneer ze vanaf het begin als één ecosysteem worden ontworpen.
      - img "Andrew en Dave, MNRV" [ref=e70]
    - generic [ref=e71]:
