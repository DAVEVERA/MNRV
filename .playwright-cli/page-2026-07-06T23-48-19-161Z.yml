    - generic [ref=e103]:
      - paragraph [ref=e104]: AI Governance & Private AI
      - heading "Mens en machine in balans" [level=3] [ref=e105]
      - paragraph [ref=e106]: Ons werk bevindt zich op het snijvlak van mens en machine. We bouwen oplossingen die logisch voelen voor gebruikers, terwijl onder de motorkap geavanceerde technologie het zware werk doet. Geen AI om de AI — maar technologie die aantoonbaar waarde toevoegt.
      - heading "Waarom AI Governance belangrijk is" [level=4] [ref=e107]
      - paragraph [ref=e108]: Met de komst van de AI Act en strengere GDPR-eisen wordt het steeds belangrijker om grip te houden op data, modellen en processen. Daarom implementeren wij waar mogelijk lokale AI-oplossingen en private LLM's die draaien binnen de eigen infrastructuur van een organisatie.
      - paragraph [ref=e109]:
        - strong [ref=e110]: "Faciliteren kun je leren:"
        - text: door de juiste technologie, processen en begeleiding samen te brengen zorgen we ervoor dat AI niet alleen voldoet aan wet- en regelgeving, maar ook daadwerkelijk waarde toevoegt voor de mensen die ermee werken.
    - generic [ref=e111]:
      - paragraph [ref=e112]: Eén geïntegreerd ecosysteem.
      - text: Strategie · Operations · Design · Development · AI
