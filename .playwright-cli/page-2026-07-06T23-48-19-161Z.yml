          - paragraph [ref=e77]: Specialist in supply chain automation, operations en customer excellence. Waar anderen complexiteit zien, ziet hij kansen om processen slimmer, sneller en beter te organiseren.
          - paragraph [ref=e78]: Zijn kracht ligt in het verbinden van operatie, automatisering en klantbeleving tot één samenwerkend geheel.
        - generic [ref=e79]:
          - paragraph [ref=e80]: AI Architect & Mid-Stack Developer
          - heading "Dave" [level=3] [ref=e81]
          - paragraph [ref=e82]: "Van architectuur en softwareontwikkeling tot AI-integraties en automatisering: Dave bouwt de oplossingen die gebruikers zien én de technologie die daarachter draait."
          - paragraph [ref=e83]: Niet alleen op papier, maar werkend, schaalbaar en klaar voor de praktijk.
