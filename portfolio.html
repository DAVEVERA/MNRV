    <span class="embed-fs-title">MNRV - assets/mnrv.html</span>
    <button type="button" onclick="openExternal()">Open extern</button>
    <button type="button" onclick="closeFs()">Sluiten (Esc)</button>
  </div>
  <iframe class="embed-fs-frame" id="embed-fs-frame" src="about:blank" sandbox="allow-scripts allow-popups allow-forms allow-presentation" allowfullscreen title="MNRV moderne website fullscreen"></iframe>
</div>

<script>
(function() {
  var embeddedUrl = 'assets/mnrv.html';
  var frame = document.getElementById('mnrv-frame');
  var status = document.getElementById('mnrv-status');
  var fsBox = document.getElementById('embed-fs');
  var fsFrame = document.getElementById('embed-fs-frame');

  function clock() {
    var el = document.getElementById('tray-clock');
    if (!el) return;
    var n = new Date();
    el.textContent = String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0');
  }
  clock();
  setInterval(clock, 10000);

  frame.addEventListener('load', function() {
    status.textContent = 'Gereed - assets/mnrv.html';
  });

  window.reloadFrame = function() {
    status.textContent = 'Laden: ' + embeddedUrl;
    frame.src = embeddedUrl;
  };

  window.openFs = function() {
    fsFrame.src = embeddedUrl;
    fsBox.classList.add('is-open');
    fsBox.setAttribute('aria-hidden', 'false');
  };

  window.closeFs = function() {
    fsBox.classList.remove('is-open');
    fsBox.setAttribute('aria-hidden', 'true');
    fsFrame.src = 'about:blank';
  };

  window.openExternal = function() {
    window.open(embeddedUrl, '_blank', 'noopener');
  };

  document.addEventListener('keydown', function(e) {
    if (fsBox.classList.contains('is-open') && e.key === 'Escape') {
      closeFs();
      return;
    }
    if (e.target && e.target.matches && e.target.matches('input,textarea')) return;
    if (e.key === 'f' || e.key === 'F') {
      e.preventDefault();
      openFs();
    } else if (e.key === 'r' || e.key === 'R') {
      e.preventDefault();
      reloadFrame();
    }
  });
})();
</script>
