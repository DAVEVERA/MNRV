<!doctype html>
<html lang="nl"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Showcase</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&amp;family=Fraunces:opsz,wght@9..144,500;9..144,600&amp;display=swap" rel="stylesheet">
  <style>
    :root{
      --paper:#f4f1ec;
      --ink:#11161d;
      --mist:rgba(255,255,255,.72);
      --line:rgba(255,255,255,.26);
      --line-strong:rgba(255,255,255,.5);
      --accent:#d7d0c5;
    }

    *{box-sizing:border-box}
    html,body{margin:0;width:100%;overflow:hidden}
    body{
      font-family:'DM Sans',sans-serif;
      color:var(--ink);
      background:var(--paper);
    }

    .page{
      width:100%;
      min-height:calc(100 * min(var(--vh, 1vh), 1vh));
      padding:18px;
      background:var(--paper);
    }

    .stage{
      width:100%;
      height:calc(100 * min(var(--vh, 1vh), 1vh) - 36px);
      position:relative;
      overflow:hidden;
      background:#d9d3c9;
    }

    .showcase{
      display:flex;
      width:100%;
      height:100%;
      overflow-x:auto;
      overflow-y:hidden;
      scroll-snap-type:x mandatory;
      scroll-behavior:smooth;
      scrollbar-width:none;
      -ms-overflow-style:none;
    }

    .showcase::-webkit-scrollbar{display:none}

    .slide{
      position:relative;
      flex:0 0 100%;
      min-width:100%;
      height:100%;
      scroll-snap-align:start;
      overflow:hidden;
      isolation:isolate;
      background:#cfc8bd;
    }

    .slide-media{
      position:absolute;
      inset:-4%;
      z-index:0;
      transition:transform .18s linear;
      transform:scale(1.03);
    }

    .slide-media img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      filter:saturate(.86) contrast(.94);
    }

    .slide::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:1;
      background:
        linear-gradient(to top, rgba(8,11,14,.72) 0%, rgba(8,11,14,.28) 36%, rgba(8,11,14,.08) 64%, rgba(8,11,14,.22) 100%);
    }

    .slide-inner{
      position:absolute;
      inset:0;
      z-index:2;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      padding:28px;
      color:#fff;
    }

    .slide-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:20px;
    }

    .slide-meta{
      display:flex;
      align-items:center;
      gap:16px;
    }

    .slide-number,
    .slide-category{
      font-size:10px;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:rgba(255,255,255,.76);
      white-space:nowrap;
    }

    .meta-divider{
      width:36px;
      height:1px;
      background:rgba(255,255,255,.32);
      margin-top:6px;
    }

    .slide-content{
      max-width:760px;
      padding-bottom:34px;
    }

    .slide-title{
      margin:0 0 18px;
      font-family:'Fraunces',serif;
      font-weight:500;
      letter-spacing:-.055em;
      line-height:.95;
      color:#fff;
      font-size:clamp(48px,7vw,104px);
    }

    .slide-link{
      display:inline-flex;
      align-items:center;
      gap:10px;
      color:#fff;
      text-decoration:none;
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.2em;
      padding-bottom:6px;
      border-bottom:1px solid rgba(255,255,255,.55);
      transition:opacity .25s ease;
    }

    .slide-link:hover{opacity:.72}
    .slide-link i{width:14px;height:14px}

    .slide-maximize{
      position:absolute;
      top:26px;
      right:26px;
      z-index:3;
      width:40px;
      height:40px;
      display:grid;
      place-items:center;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.08);
      color:#fff;
      cursor:pointer;
      backdrop-filter:blur(8px);
      transition:.25s ease;
    }

    .slide-maximize:hover{
      background:rgba(255,255,255,.16);
      border-color:rgba(255,255,255,.48);
    }

    .slide-maximize i{width:17px;height:17px}

    .slider-ui{
      position:absolute;
      left:28px;
      right:28px;
      bottom:24px;
      z-index:4;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:end;
      gap:28px;
      color:#fff;
    }

    .progress-area{
      display:flex;
      flex-direction:column;
      gap:12px;
      min-width:0;
    }

    .counter{
      display:flex;
      align-items:center;
      gap:9px;
      font-size:10px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:rgba(255,255,255,.68);
    }

    .counter-current{
      color:#fff;
    }

    .progress-track{
      width:100%;
      height:1px;
      background:rgba(255,255,255,.22);
      overflow:hidden;
      position:relative;
    }

    .progress-fill{
      position:absolute;
      inset:0 auto 0 0;
      width:20%;
      background:rgba(255,255,255,.92);
      transition:width .35s ease;
    }

    .nav-buttons{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .nav-button{
      width:44px;
      height:44px;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.08);
      color:#fff;
      display:grid;
      place-items:center;
      cursor:pointer;
      backdrop-filter:blur(8px);
      transition:.25s ease;
    }

    .nav-button:hover{
      background:#fff;
      color:#11161d;
      border-color:#fff;
    }

    .nav-button i{width:17px;height:17px}

    .nav-button:focus-visible,
    .slide-link:focus-visible,
    .slide-maximize:focus-visible,
    .fullscreen-close:focus-visible{
      outline:2px solid #fff;
      outline-offset:4px;
    }

    .fullscreen-overlay{
      position:fixed;
      inset:0;
      z-index:999;
      background:#050607;
      display:none;
      opacity:0;
      transition:opacity .3s ease;
    }

    .fullscreen-overlay.active{
      display:block;
      opacity:1;
    }

    .fullscreen-image{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .fullscreen-close{
      position:absolute;
      top:22px;
      right:22px;
      z-index:1000;
      width:44px;
      height:44px;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.08);
      color:#fff;
      display:grid;
      place-items:center;
      cursor:pointer;
      backdrop-filter:blur(8px);
      transition:.25s ease;
    }

    .fullscreen-close:hover{
      background:rgba(255,255,255,.16);
      border-color:rgba(255,255,255,.5);
    }

    .fullscreen-close i{width:18px;height:18px}

    @media(max-width:720px){
      .page{padding:10px}
      .stage{height:calc(100 * min(var(--vh, 1vh), 1vh) - 20px)}
      .slide-inner{padding:18px}
      .slide-content{padding-bottom:46px}
      .slide-title{font-size:clamp(42px,13vw,72px)}
      .slide-maximize{top:18px;right:18px;width:36px;height:36px}
      .slider-ui{
        left:18px;
        right:18px;
        bottom:16px;
        gap:16px;
      }
      .slide-meta{
        gap:10px;
        max-width:70%;
        flex-wrap:wrap;
      }
      .meta-divider{width:22px}
      .nav-button{width:40px;height:40px}
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();

      const showcase = document.getElementById('showcase');
      const slides = Array.from(document.querySelectorAll('.slide'));
      const progressFill = document.getElementById('progressFill');
      const currentIndex = document.getElementById('currentIndex');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const fullscreenOverlay = document.getElementById('fullscreenOverlay');
      const fullscreenImage = document.getElementById('fullscreenImage');
      const fullscreenClose = document.getElementById('fullscreenClose');

      let activeIndex = 0;
      let ticking = false;

      function getActiveIndex(){
        const scrollLeft = showcase.scrollLeft;
        let closest = 0;
        let minDistance = Infinity;

        slides.forEach((slide, index) => {
          const distance = Math.abs(slide.offsetLeft - scrollLeft);
          if(distance < minDistance){
            minDistance = distance;
            closest = index;
          }
        });

        return closest;
      }

      function updateUI(){
        activeIndex = getActiveIndex();
        currentIndex.textContent = String(activeIndex + 1).padStart(2,'0');
        progressFill.style.width = (((activeIndex + 1) / slides.length) * 100) + '%';

        slides.forEach((slide) => {
          const rect = slide.getBoundingClientRect();
          const viewportCenter = window.innerWidth / 2;
          const slideCenter = rect.left + rect.width / 2;
          const distance = slideCenter - viewportCenter;
          const media = slide.querySelector('.slide-media');
          media.style.transform = 'translate3d(' + (distance * -0.035) + 'px,0,0) scale(1.04)';
        });

        ticking = false;
      }

      function requestTick(){
        if(!ticking){
          requestAnimationFrame(updateUI);
          ticking = true;
        }
      }

      showcase.addEventListener('scroll', requestTick, {passive:true});
      window.addEventListener('resize', requestTick);

      prevBtn.addEventListener('click', () => {
        const nextIndex = Math.max(0, activeIndex - 1);
        slides[nextIndex].scrollIntoView({behavior:'smooth', inline:'start', block:'nearest'});
      });

      nextBtn.addEventListener('click', () => {
        const nextIndex = Math.min(slides.length - 1, activeIndex + 1);
        slides[nextIndex].scrollIntoView({behavior:'smooth', inline:'start', block:'nearest'});
      });

      document.querySelectorAll('.slide-maximize').forEach((button, index) => {
        button.addEventListener('click', () => {
          const img = slides[index].querySelector('img');
          if(img && img.src){
            fullscreenImage.src = img.src;
            fullscreenImage.alt = img.alt || 'Project image';
            fullscreenOverlay.classList.add('active');
            fullscreenOverlay.setAttribute('aria-hidden','false');
          }
        });
      });

      function closeFullscreen(){
        fullscreenOverlay.classList.remove('active');
        fullscreenOverlay.setAttribute('aria-hidden','true');
      }

      fullscreenClose.addEventListener('click', closeFullscreen);
      fullscreenOverlay.addEventListener('click', (e) => {
        if(e.target === fullscreenOverlay) closeFullscreen();
      });
      document.addEventListener('keydown', (e) => {
        if(e.key === 'Escape' && fullscreenOverlay.classList.contains('active')) closeFullscreen();
      });

      updateUI();
    });
  </script>
